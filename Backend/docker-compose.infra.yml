version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: socialflow-postgres-infra
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    container_name: socialflow-redis-infra
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --maxmemory 512mb 
      --maxmemory-policy volatile-lru
      --appendonly yes

  redis-insight:
    image: redis/redisinsight:latest
    container_name: socialflow-redis-insight
    ports:
      - "5540:5540"
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
